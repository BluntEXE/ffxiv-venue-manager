name: smoke

on:
  workflow_dispatch:
  schedule:
    # Hourly. Cheap, hits public surfaces only, no secrets needed.
    - cron: "0 * * * *"
  push:
    branches: [main]
    paths:
      # Only re-run on changes that could break the public surface.
      - "app/**"
      - "components/**"
      - "lib/**"
      - "next.config.ts"
      - "proxy.ts"
      - "package.json"
      - "package-lock.json"
      - "tests/**"
      - "playwright.config.ts"
      - ".github/workflows/smoke.yml"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite against prod
        env:
          PLAYWRIGHT_BASE_URL: https://xivvenuemanager.com
        run: npm run test:smoke

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
