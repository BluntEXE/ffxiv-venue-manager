name: smoke

on:
  workflow_dispatch:
  schedule:
    # Hourly. Cheap, hits public surfaces only, no secrets needed.
    - cron: "0 * * * *"
  push:
    branches: [main]
    paths:
      # Only re-run on changes that could break the public surface.
      - "apps/web/app/**"
      - "apps/web/components/**"
      - "apps/web/lib/**"
      - "apps/web/next.config.ts"
      - "apps/web/proxy.ts"
      - "apps/web/package.json"
      - "apps/web/tests/**"
      - "apps/web/playwright.config.ts"
      - ".github/workflows/smoke.yml"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          for i in 1 2 3; do
            timeout 180 pnpm --filter web exec playwright install --with-deps chromium && exit 0
            echo "Playwright install attempt $i timed out or failed, retrying..."
          done
          exit 1

      - name: Run smoke suite against prod
        env:
          PLAYWRIGHT_BASE_URL: https://xivvenuemanager.com
        run: pnpm --filter web test:smoke

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
