packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

overrides:
  metro: "0.80.12"
  metro-babel-transformer: "0.80.12"
  metro-cache: "0.80.12"
  metro-cache-key: "0.80.12"
  metro-config: "0.80.12"
  metro-core: "0.80.12"
  metro-file-map: "0.80.12"
  metro-resolver: "0.80.12"
  metro-runtime: "0.80.12"
  metro-source-map: "0.80.12"
  metro-symbolicate: "0.80.12"
  metro-transform-plugins: "0.80.12"
  metro-transform-worker: "0.80.12"
  "@xmldom/xmldom": ">=0.8.13"
  "esbuild@>=0.27.3 <0.28.1": ">=0.28.1"
  "hono": ">=4.12.25"
  "ws": ">=8.21.0"
  "undici": ">=6.27.0"

auditConfig:
  ignoreCves:
    - GHSA-34x7-hfp2-rc4v
    - GHSA-83g3-92jg-28cx
    - GHSA-8qq5-rm4j-mr97
    - GHSA-9ppj-qmqm-q256
    - GHSA-qffp-2rhf-9h96
    - GHSA-r6q2-hw4h-h46w
