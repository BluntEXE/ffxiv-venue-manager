<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>

  <!-- Angular speech bubble -->
  <path d="M3 5 L29 5 L29 21 L19.5 21 L16 27 L12.5 21 L3 21 Z"
        fill="url(#bubble)" stroke="#60a5fa" stroke-width="0.7" opacity="0.95"/>

  <!-- Top facet highlight (crystal effect) -->
  <path d="M3 5 L16 5 L29 5 L26 8.5 L6 8.5 Z"
        fill="#93c5fd" opacity="0.2"/>

  <!-- Crystal diamond at top -->
  <polygon points="16,1.5 18.5,5 16,8.5 13.5,5"
           fill="url(#crystal)" stroke="#bae6fd" stroke-width="0.4" filter="url(#glow)"/>

  <!-- Three lines = shout text -->
  <line x1="8"  y1="12.5" x2="24" y2="12.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="8"  y1="15.5" x2="20" y2="15.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="8"  y1="18.5" x2="16" y2="18.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Sparkle top-right -->
  <polygon points="27,4 27.6,5.5 27,7 26.4,5.5" fill="#bae6fd" opacity="0.8" filter="url(#glow)"/>
</svg>
